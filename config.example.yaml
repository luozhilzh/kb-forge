# Copy this file to config.yaml (git-ignored) and fill in YOUR non-secret values.
# NEVER put a real group_id, token, or API key here. Secrets go in .env.

kb_root: "./my-knowledge-base"
group_id: "REPLACE_WITH_YOUR_GROUP_ID"   # placeholder; never a real value in a committed file
platform: "zsxq"
local_attach_dir: "_attachments_src"
zsxq_cli_path: "zsxq-cli"

output:
  enabled: true
  formats: [pptx, md]

wiki:
  schema_path: "SCHEMA.md"
  slug_style: "kebab"
  page_char_limit: 4000
  enrich:
    enabled: false
    strategy: local          # local (zero-dep) | none | llm (optional OpenAI-compatible enhancement)
    model: ""                # used only when strategy: llm (e.g. gpt-4o-mini)
    # llm:                     # optional; api_key reads from .env LLM_API_KEY by default
    #   base_url: "https://api.openai.com/v1/chat/completions"
    #   model: "gpt-4o-mini"

fetch:
  page_size: 50
  long_tail_guard: 5
  incremental: false

paths:
  raw: "raw"
  wiki: "wiki"
  archive: "archive"
  cases: "cases"
  attachments: "_attachments"

query:
  backend: "graph"
