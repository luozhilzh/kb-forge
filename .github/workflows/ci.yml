name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Pure-logic + mock-adapter matrix on BOTH Ubuntu and Windows ──
  # Catches path / encoding / CRLF regressions (we have hit 4 Windows-only bugs).
  # Network / real-credential tests are tagged @pytest.mark.e2e and excluded here.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not e2e" -q

  # ── Coverage lane: Ubuntu only (saves minutes). ──
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=kbforge -q

  # ── B↔core drift guard (§12-⑤): exercise the EXACT CLI surface that the B
  # skill and the expert package invoke (make-fixtures -> build -> export). If
  # core changes that surface, this fails loudly instead of B / expert silently
  # breaking. Public-API import check is included as the cheap first line. ──
  smoke-core-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -c "from kbforge.core.wiki import ingest_post; from kbforge.core import run; from kbforge.core.exporters import get_exporter, extract_bundles"
      - name: B↔core smoke — build + export via CLI
        shell: bash
        run: |
          D="${{ runner.temp }}/kbf_smoke"
          python -m kbforge make-fixtures --out "$D"
          python -m kbforge build --kb-root "$D"
          python -m kbforge export --kb-root "$D" --format md --out "$D/out.md"
          test -f "$D/out.md" && echo "B↔core smoke OK"
